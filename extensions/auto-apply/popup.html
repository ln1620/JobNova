<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        font-family: system-ui, sans-serif;
        width: 280px;
        padding: 14px;
        margin: 0;
        background: #0b1020;
        color: #f1f5f9;
      }
      h1 { font-size: 15px; margin: 0 0 6px; }
      p { font-size: 12px; color: #94a3b8; line-height: 1.4; }
      button {
        width: 100%;
        margin-top: 10px;
        padding: 10px;
        border: none;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
        background: #10b981;
        color: #0b1020;
      }
      #status { margin-top: 10px; font-size: 11px; color: #a78bfa; }
    </style>
  </head>
  <body>
    <h1>JobNova Auto Apply</h1>
    <p>Lever auto-apply runs on EC2. Popup is for debugging only.</p>
    <button id="continue">Continue to next job</button>
    <p id="status"></p>
    <script src="popup.js"></script>
  </body>
</html>
